model:
  name: "Qwen/Qwen2.5-Math-7B-Instruct"
  short_name: "qwen2.5-math-7b"
  dtype: "bfloat16"
  device: "cuda"
  max_new_tokens: 3000
  trust_remote_code: true
  attn_implementation: "eager"

decoding:
  mode: "digte"
  thresholds_file: "data/calibration_outputs/learned_thresholds.json"
  k_continuations: 3
  continuation_length: 12
  continuation_temperature: 1.2
  expansion_delta_l: 50
  min_tokens_before_trigger: 20

dataset:
  name: "math500"
  split: "test"
  n_problems: -1
  seed: 42

output:
  dir: "results"
  predictions_file: "results/predictions_{model_short_name}_{decoding_mode}.jsonl"
  metrics_file: "results/metrics_{model_short_name}_{decoding_mode}.json"
  log_detail: false
  detail_log_file: "logs/detail_{model_short_name}_{decoding_mode}.jsonl"

logging:
  level: "INFO"
  log_file: "logs/inference_{model_short_name}_{decoding_mode}.log"