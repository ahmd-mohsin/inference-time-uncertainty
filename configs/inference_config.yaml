model:
  name: "Qwen/Qwen2.5-Math-7B-Instruct"
  short_name: "qwen2.5-math-7b"
  dtype: "bfloat16"
  device: "cuda"
  max_new_tokens: 3000
  trust_remote_code: true
  attn_implementation: "eager"

decoding:
  mode: "digte"
  thresholds_file: "data/calibration_outputs/learned_thresholds.json"
  k_continuations: 3
  continuation_length: 12
  continuation_temperature: 0.3
  expansion_delta_l: 30
  min_tokens_before_trigger: 20
  max_entropy_triggers_per_problem: 8

dataset:
  name: "math500"
  split: "test"
  n_problems: -1
  seed: 42

output:
  dir: "data/inference_outputs"
  predictions_file: "data/inference_outputs/predictions_{model_short_name}_{decoding_mode}.jsonl"
  metrics_file: "data/inference_outputs/metrics_{model_short_name}_{decoding_mode}.json"
  detail_log_file: "data/inference_outputs/detail_{model_short_name}_{decoding_mode}.jsonl"
  log_detail: false

logging:
  level: "INFO"
